<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUM — Product</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="shop-header">
  <a class="logo" href="index.html" aria-label="DUM — go to home page">
    <span class="l-d">D</span>
    <span class="l-u">U</span>
    <span class="l-m">M</span>
    <span class="dot dot1"></span>
  </a>

  <div class="search-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <span>What We Can Help You?</span>
  </div>

  <div class="shop-links">
    <span>Teams <svg width="10" height="6" viewBox="0 0 10 6"><path d="M0 0 L5 6 L10 0" fill="currentColor"/></svg></span>
    <span>Drivers <svg width="10" height="6" viewBox="0 0 10 6"><path d="M0 0 L5 6 L10 0" fill="currentColor"/></svg></span>
    <span>Apparel <svg width="10" height="6" viewBox="0 0 10 6"><path d="M0 0 L5 6 L10 0" fill="currentColor"/></svg></span>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
  </div>
</header>
<div class="red-rule"></div>

<main class="page-content">

  <div class="shop-title">
    <h1>Shop Your Team</h1>
    <a class="fav-link" href="#">Add favorites</a>
  </div>

  <div class="team-rail">
    <div class="team-dot"><img class="circle" src="images/Ferrari Logo.jpg" alt="Ferrari">Ferrari</div>
    <div class="team-dot"><img class="circle" src="images/RedBull Racing.jpg" alt="RedBull">RedBull</div>
    <div class="team-dot"><img class="circle" src="images/new mercedes logo.jpg" alt="Mercedes">Mercedes</div>
    <div class="team-dot"><img class="circle" src="images/mclaren.jpg" alt="McLaren">McLaren</div>
    <div class="team-dot"><img class="circle" src="images/Williams Racing new logo Formula 1.jpg" alt="Williams">Williams</div>
    <div class="team-dot"><img class="circle" src="images/Alpine.jpg" alt="Alpine">Alpine</div>
    <span class="arrow">&rsaquo;</span>
  </div>

  <div class="product-grid">
    <div class="product-card">
      <img class="shirt" src="images/PUMA T-shirt des pilotes Replica Scuderia Ferrari HP Unisexe, Accessoires, Rouge, XS.jpg" alt="Ferrari Jersey">
      <div class="name">Ferrari Jersey</div>
    </div>
    <div class="product-card">
      <img class="shirt" src="images/Red Bull Racing F1 Kid's 2026 Team T-Shirt - Youth Blue_Navy.jpg" alt="RedBull Jersey">
      <div class="name">RedBull Jersey</div>
    </div>
    <div class="product-card">
      <img class="shirt" src="images/adidas x Mercedes AMG V-neck T-shirt - Black.jpg" alt="Mercedes Jersey">
      <div class="name">Mercedes Jersey</div>
    </div>
  </div>

</main>

</body>
</html>
